server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bisai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false
  ai:
    openai:
      base-url: https://api-inference.modelscope.cn
      api-key: ${ai.api-key:ms-cb4b0861-40d9-4697-86ac-b8764e1cdbd1}
      chat:
        options:
          model: Qwen/Qwen3.5-35B-A3B
          max-tokens: 2048
          temperature: 0.3
      embedding:
        options:
          model: damo/nlp_corom_sentence-embedding_chinese-base

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.bisai.mapper: warn
    com.bisai.service: info
    com.bisai.controller: info
    "[org.apache.fontbox]": error
    "[org.apache.pdfbox.pdmodel.font.FileSystemFontProvider]": error

# 文件存储
file:
  upload-path: ./data/files/
  allowed-types: .doc,.docx,.pdf,.jpg,.jpeg,.png,.xls,.xlsx,.zip
  max-size: 209715200
  max-versions: 5

# JWT
jwt:
  secret: ${JWT_SECRET:bisai-smart-evaluation-system-jwt-secret-key-2024}
  expiration: 86400000

# AI 模型配置 (ModelScope)
ai:
  base-url: https://api-inference.modelscope.cn/v1
  api-key: ${AI_API_KEY:ms-cb4b0861-40d9-4697-86ac-b8764e1cdbd1}
  model: Qwen/Qwen3.5-35B-A3B
  embedding-model: damo/nlp_corom_sentence-embedding_chinese-base
  vision-model: Qwen/Qwen3.5-35B-A3B
  max-tokens: 2048
  temperature: 0.3
  daily-token-limit: 200000
  daily-call-limit: 1000
  rerank-model:
